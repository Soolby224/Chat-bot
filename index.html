<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>

  <main class="landing-shell">
    <header class="topbar">
      <button class="model-switch" type="button" aria-label="Choisir un modele">
        <span>Nova Flow</span>
        <span class="caret"></span>
      </button>

      <nav class="topnav" aria-label="Navigation principale">
        <a href="#">Produit</a>
        <a href="#">Tarifs</a>
        <a href="#">API</a>
        <button class="signin-btn" type="button">Connexion</button>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-mark" aria-hidden="true">
        <span class="mark-piece mark-piece-top"></span>
        <span class="mark-piece mark-piece-main"></span>
        <span class="mark-piece mark-piece-curve"></span>
      </div>

      <div class="hero-copy">
        <p class="eyebrow">Assistant creatif nouvelle generation</p>
        <h1>Bonjour, je suis Nova.</h1>
        <p class="subtitle">
          Un espace fluide pour discuter, creer des idees, resumer du contenu
          et imaginer de nouveaux projets sans distraction.
        </p>
      </div>

      <form class="composer-card" aria-label="Zone de saisie du chatbot">
        <label class="sr-only" for="prompt">Votre message</label>
        <textarea id="prompt" rows="4" placeholder="Pose une question, demande une idee ou commence une conversation..."></textarea>

        <div class="composer-footer">
          <div class="composer-tools" aria-label="Outils rapides">
            <button type="button" class="tool-btn" aria-label="Ajouter du contenu">+</button>
            <button type="button" class="tool-btn" aria-label="Changer de langue">Lang</button>
            <button type="button" class="tool-btn active" aria-label="Activer le mode creatif">Spark</button>
          </div>

          <div class="composer-meta">
            <span class="status-dot"></span>
            <button type="submit" class="send-btn" aria-label="Envoyer le message">
              <span class="send-arrow"></span>
            </button>
          </div>
        </div>
      </form>

      <div class="prompt-row" aria-label="Suggestions">
        <button type="button">Ecris une page d'accueil</button>
        <button type="button">Explique un code simplement</button>
        <button type="button">Trouve des idees de business</button>
      </div>
    </section>
  </main>
</body>
</html>
