<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>

  <main class="landing-shell">
    <header class="topbar">
      <button class="model-switch" type="button" aria-label="Modele utilise">
        <span>Gemini 2.5 Flash</span>
        <span class="caret"></span>
      </button>

      <nav class="topnav" aria-label="Navigation principale">
        <a href="#">Produit</a>
        <a href="#">Tarifs</a>
        <a href="#">API</a>
        <button class="signin-btn" type="button">Connexion</button>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-mark" aria-hidden="true">
        <span class="mark-piece mark-piece-top"></span>
        <span class="mark-piece mark-piece-main"></span>
        <span class="mark-piece mark-piece-curve"></span>
      </div>

      <div class="hero-copy">
        <p class="eyebrow">Assistant creatif nouvelle generation</p>
        <h1>Bonjour, je suis Nova.</h1>
        <p class="subtitle">
          Un espace fluide pour discuter, creer des idees, resumer du contenu
          et imaginer de nouveaux projets sans distraction.
        </p>
      </div>

      <section class="chat-thread" id="chatThread" hidden aria-live="polite"></section>

      <form class="composer-card" aria-label="Zone de saisie du chatbot">
        <label class="sr-only" for="prompt">Votre message</label>
        <input
          id="fileInput"
          class="sr-only"
          type="file"
          multiple
          accept=".txt,.md,.markdown,.csv,.json,.js,.ts,.tsx,.jsx,.py,.java,.c,.cpp,.h,.hpp,.html,.css,.xml,.yml,.yaml,.log,.sql,.php,.rb,.go,.rs,.sh"
        >
        <textarea id="prompt" rows="4" placeholder="Pose une question, demande une idee ou commence une conversation..."></textarea>

        <section class="attachment-panel" id="attachmentPanel" hidden aria-label="Fichiers joints">
          <p class="attachment-label">Fichiers ajoutes</p>
          <div class="attachment-list" id="attachmentList"></div>
        </section>

        <div class="composer-footer">
          <div class="composer-tools" aria-label="Outils rapides">
            <button type="button" class="tool-btn attach-btn" id="attachButton" aria-label="Ajouter des fichiers">
              <span class="tool-icon">+</span>
              <span>Fichier</span>
            </button>
            <p class="composer-help">
              Glisse-depose ou ajoute des fichiers texte, markdown, CSV, JSON et code.
            </p>
          </div>

          <div class="composer-meta">
            <span class="status-dot" title="Connexion API"></span>
            <span class="status-text" id="statusText">Pret</span>
            <button type="submit" class="send-btn" aria-label="Envoyer le message">
              <span class="send-arrow"></span>
            </button>
          </div>
        </div>
      </form>

      <div class="prompt-row" aria-label="Suggestions">
        <button type="button">Resume ce document</button>
        <button type="button">Explique ce code simplement</button>
        <button type="button">Trouve des idees de business</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
